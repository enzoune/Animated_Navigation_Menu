<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Bar Animada</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <input type="radio" name="slider" id="home" checked>
        <input type="radio" name="slider" id="blog" checked>
        <input type="radio" name="slider" id="code" checked>
        <input type="radio" name="slider" id="help" checked>
        <input type="radio" name="slider" id="about" checked>
        <nav>
            <div class="slider"></div>
            <label for="home" class="home">
                <i class="fas fa-home"></i>Início
            </label>
            <label for="blog" class="blog">
                <i class="fas fa-blog"></i>Blog
            </label>
            <label for="code" class="code">
                <i class="fas fa-code"></i>Código
            </label>
            <label for="help" class="help">
                <i class="fas fa-help"></i>Ajuda
            </label>
            <label for="about" class="user">
                <i class="fas fa-user"></i>Sobre
            </label>
        </nav>
    </div>
</body>

</html>
